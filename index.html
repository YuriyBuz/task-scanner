<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Варки соусу | AI Оператор</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .photo-zone { border: 2px dashed #cbd5e1; min-height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border-radius: 12px; overflow: hidden; }
        .photo-zone img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; }
        .ai-pulse { animation: pulse 2s infinite; border-color: #8b5cf6 !important; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.4); } 50% { box-shadow: 0 0 0 6px rgba(139, 92, 246, 0.1); } }
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid #fff; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 p-4 font-sans pb-10">

    <div class="max-w-lg mx-auto bg-white p-6 rounded-2xl shadow-xl space-y-6">
        <header class="text-center">
            <h1 class="text-2xl font-bold text-slate-800">Звіт Варки</h1>
            <div id="aiStatus" class="hidden items-center justify-center gap-2 text-violet-600 font-bold mt-2">
                <div class="spinner border-violet-600 border-t-violet-200" style="width:16px;height:16px;"></div> ШІ розпізнає...
            </div>
        </header>

        <div>
            <label class="block text-xs font-bold uppercase text-slate-500 mb-2">Оператор *</label>
            <select id="operator" class="w-full p-3 border-2 border-slate-200 rounded-lg outline-none focus:border-orange-500">
                <option value="" disabled selected>Оберіть себе...</option>
                <option value="Солдатова І.В.">Солдатова І.В. (приклад)</option>
                <option value="Загура І.Б.">Загура І.Б. (приклад)</option>
            </select>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div onclick="document.getElementById('in-front').click()" class="photo-zone cursor-pointer" id="z-front">
                <span class="text-xs text-slate-400 font-bold">ФОТО ЛИЦЕ</span>
                <input type="file" id="in-front" accept="image/*" capture="environment" class="hidden" onchange="uploadPhoto(this, 'front')">
                <img id="img-front">
            </div>
            <div onclick="document.getElementById('in-back').click()" class="photo-zone cursor-pointer" id="z-back">
                <span class="text-xs text-slate-400 font-bold">ФОТО ЗВОРОТ</span>
                <input type="file" id="in-back" accept="image/*" capture="environment" class="hidden" onchange="uploadPhoto(this, 'back')">
                <img id="img-back">
            </div>
        </div>

        <div class="bg-violet-50 p-4 rounded-xl border border-violet-100 space-y-4">
            <h3 class="text-xs font-bold text-violet-700 uppercase">Дані розпізнані ШІ</h3>
            <div class="grid grid-cols-2 gap-4">
                <input type="number" id="taskNum" placeholder="№ Завдання" class="p-3 border-2 border-slate-200 rounded-lg w-full font-bold">
                <input type="text" id="prodName" placeholder="Назва соусу" class="p-3 border-2 border-slate-200 rounded-lg w-full text-xs">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="bcFront" placeholder="ШК Лице" class="p-3 border-2 border-slate-200 rounded-lg w-full text-xs font-mono">
                <input type="text" id="bcBack" placeholder="ШК Зворот" class="p-3 border-2 border-slate-200 rounded-lg w-full text-xs font-mono">
            </div>
        </div>

        <button id="sendBtn" onclick="submit()" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-all flex justify-center items-center gap-2">
            <span>ВІДПРАВИТИ ЗВІТ</span>
            <div id="loader" class="spinner hidden"></div>
        </button>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzSGUwbgfu6pa1Jk9SsTlCdiNJlzzUVb8GWM2w9-iAQWgt9paBIwzwaEsm3uBizR6nl/exec"; // СЮДИ ПЕРЕМАЛЮЙТЕ URL З GOOGLE SCRIPT
        let photos = { front: null, back: null };

        async function uploadPhoto(input, side) {
            if (!input.files[0]) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                // Стискаємо фото перед відправкою (макс 1000px)
                const img = new Image();
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    const scale = 1000 / Math.max(img.width, img.height);
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    const base64 = canvas.toDataURL('image/jpeg', 0.7);
                    
                    photos[side] = base64;
                    document.getElementById(`img-${side}`).src = base64;
                    document.getElementById(`img-${side}`).style.display = 'block';

                    // Відправляємо ШІ на аналіз
                    analyze(base64, side);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }

        async function analyze(image, side) {
            document.getElementById('aiStatus').style.display = 'flex';
            const fields = side === 'front' ? ['taskNum', 'bcFront', 'prodName'] : ['bcBack'];
            fields.forEach(id => document.getElementById(id).classList.add('ai-pulse'));

            try {
                const res = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'ai_extract', image, side })
                });
                const result = await res.json();
                if (result.status === 'success') {
                    const d = result.data;
                    if (side === 'front') {
                        if (d.taskNumber) document.getElementById('taskNum').value = d.taskNumber;
                        if (d.barcode) document.getElementById('bcFront').value = d.barcode;
                        if (d.product) document.getElementById('prodName').value = d.product;
                    } else {
                        if (d.barcode) document.getElementById('bcBack').value = d.barcode;
                    }
                }
            } finally {
                document.getElementById('aiStatus').style.display = 'none';
                fields.forEach(id => document.getElementById(id).classList.remove('ai-pulse'));
            }
        }

        async function submit() {
            const data = {
                action: 'submit',
                operator: document.getElementById('operator').value,
                taskNumber: document.getElementById('taskNum').value,
                barcodeFront: document.getElementById('bcFront').value,
                barcodeBack: document.getElementById('bcBack').value,
                product: document.getElementById('prodName').value,
                frontImage: photos.front,
                backImage: photos.back,
                time: new Date().toLocaleString()
            };

            if (!data.operator || !data.taskNumber || !photos.front || !photos.back) {
                alert("Заповніть оператора та зробіть 2 фото!"); return;
            }

            document.getElementById('sendBtn').disabled = true;
            document.getElementById('loader').classList.remove('hidden');

            try {
                await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                alert("✅ Звіт відправлено!");
                location.reload();
            } catch (e) {
                alert("Помилка відправки!");
            }
        }
    </script>
</body>
</html>
